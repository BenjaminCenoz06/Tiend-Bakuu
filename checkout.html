<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Finalizar compra · BAKU Indumentaria</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#100E09">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%23100E09'/%3E%3Ccircle cx='16' cy='16' r='12.5' fill='none' stroke='%23E8A63B' stroke-width='1.2'/%3E%3Ctext x='16' y='21' font-family='Arial Black,sans-serif' font-size='13' font-weight='900' fill='%23E8A63B' text-anchor='middle'%3EB%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap">
  <style>
    :root{
      --bg:#100E09; --bg-2:#171410; --surface:#1E1A14; --surface-2:#252017;
      --border:#302A20; --border-2:#443C2C;
      --ink:#F1ECDE; --ink-soft:#CFC7B4; --ink-mute:#8A8371;
      --gold:#E8A63B; --gold-hi:#F4B94E; --on-gold:#1A1305;
      --success:#4ED08A; --danger:#E5484D; --danger-bg:rgba(229,72,77,.14);
      --r:12px; --r-lg:16px; --r-xl:22px;
      --font:"Inter",system-ui,sans-serif; --display:"Archivo",var(--font);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--ink);font-family:var(--font);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100svh}
    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}
    .wrap{max-width:1120px;margin:0 auto;padding:0 clamp(1rem,4vw,2rem)}

    /* Header */
    .co-head{border-bottom:1px solid var(--border);position:sticky;top:0;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(10px);z-index:10}
    .co-head-in{display:flex;align-items:center;justify-content:space-between;height:64px}
    .brand{display:flex;align-items:center;gap:.6rem;font-family:var(--display);font-weight:800;letter-spacing:.06em}
    .brand .seal{width:34px;height:34px;display:grid;place-items:center;border-radius:50%;background:var(--bg-2);border:1px solid var(--gold);color:var(--gold);font-size:.85rem}
    .co-back{color:var(--ink-mute);font-size:.9rem;display:inline-flex;align-items:center;gap:.4rem}
    .co-back:hover{color:var(--ink)}

    /* Stepper */
    .stepper{display:flex;align-items:center;justify-content:center;gap:0;padding:1.6rem 0 .4rem}
    .stepper .st{display:flex;flex-direction:column;align-items:center;gap:.4rem;color:var(--ink-mute);font-size:.78rem;letter-spacing:.03em;flex:0 0 auto}
    .stepper .st b{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;border:1.5px solid var(--border-2);font-family:var(--display);font-size:.9rem;background:var(--surface)}
    .stepper .st.is-done b{border-color:var(--gold);color:var(--gold)}
    .stepper .st.is-active b{border-color:var(--gold);background:var(--gold);color:var(--on-gold)}
    .stepper .st.is-active{color:var(--ink)}
    .stepper .bar{flex:1;max-width:90px;height:1.5px;background:var(--border-2);margin:0 .5rem;margin-bottom:1.3rem}
    .stepper .bar.is-done{background:var(--gold)}

    /* Layout */
    .co-grid{display:grid;grid-template-columns:1.55fr 1fr;gap:1.4rem;align-items:start;padding:1rem 0 4rem}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:clamp(1.1rem,3vw,1.6rem)}
    .card + .card{margin-top:1rem}
    .card h2{font-family:var(--display);font-weight:700;font-size:1.05rem;margin-bottom:1rem;letter-spacing:.01em}
    .section-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-mute);font-weight:700;margin:1.3rem 0 .7rem}
    .section-label:first-child{margin-top:0}

    /* Form */
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
    .field{display:flex;flex-direction:column;gap:.35rem;margin-bottom:.8rem}
    .field.col2{grid-column:1/-1}
    label{font-size:.8rem;color:var(--ink-soft);font-weight:500}
    .input{width:100%;background:var(--bg-2);border:1px solid var(--border-2);border-radius:var(--r);color:var(--ink);
      padding:.8rem .9rem;font:inherit;font-size:16px;min-height:50px;transition:border-color .15s}
    .input:focus{outline:none;border-color:var(--gold)}
    .input::placeholder{color:var(--ink-mute)}
    textarea.input{min-height:80px;resize:vertical}
    .hint{font-size:.78rem;color:var(--ink-mute);margin-top:.3rem}
    .err{color:var(--danger);font-size:.82rem;margin-top:.5rem;min-height:1em}

    /* Buttons */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;width:100%;
      background:var(--gold);color:var(--on-gold);border:0;border-radius:var(--r);
      font:inherit;font-weight:700;font-size:.95rem;padding:.95rem 1.2rem;min-height:52px;cursor:pointer;transition:filter .15s,opacity .15s}
    .btn:hover{filter:brightness(1.06)}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--border-2)}
    .btn-ghost:hover{border-color:var(--gold);color:var(--gold);filter:none}
    .btn-google{background:#fff;color:#1f1f1f}
    .btn-row{display:flex;gap:.7rem;margin-top:1rem}
    .btn-row .btn{width:auto;flex:1}

    /* Summary */
    .summary{position:sticky;top:88px}
    .sum-item{display:flex;gap:.8rem;padding:.7rem 0;border-bottom:1px solid var(--border)}
    .sum-item:first-child{padding-top:0}
    .sum-thumb{width:52px;height:62px;border-radius:8px;background:var(--bg-2);border:1px solid var(--border);object-fit:cover;flex:0 0 auto;display:grid;place-items:center;color:var(--ink-mute)}
    .sum-info{flex:1;min-width:0}
    .sum-info .n{font-weight:600;font-size:.9rem}
    .sum-info .m{font-size:.78rem;color:var(--ink-mute)}
    .sum-info .p{font-family:var(--display);font-weight:700;margin-top:.2rem}
    .sum-line{display:flex;justify-content:space-between;padding:.5rem 0;color:var(--ink-soft);font-size:.92rem}
    .sum-total{display:flex;justify-content:space-between;align-items:center;padding-top:.8rem;margin-top:.4rem;border-top:1px solid var(--border-2)}
    .sum-total b{font-family:var(--display);font-size:1.4rem}

    /* Auth tabs */
    .tabs{display:flex;gap:.4rem;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r);padding:.3rem;margin-bottom:1.2rem}
    .tabs button{flex:1;background:transparent;border:0;color:var(--ink-mute);font:inherit;font-weight:600;padding:.6rem;border-radius:9px;cursor:pointer}
    .tabs button.is-active{background:var(--surface);color:var(--ink)}
    .divider{display:flex;align-items:center;gap:.8rem;color:var(--ink-mute);font-size:.8rem;margin:1.1rem 0}
    .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}

    /* Payment options */
    .pay{display:flex;flex-direction:column;gap:.7rem;margin:.5rem 0 1rem}
    .pay label{display:flex;gap:.8rem;align-items:flex-start;padding:1rem;border:1.5px solid var(--border-2);border-radius:var(--r);cursor:pointer;transition:border-color .15s,background .15s}
    .pay label:hover{border-color:var(--border-2)}
    .pay input{margin-top:.2rem;accent-color:var(--gold);width:18px;height:18px;flex:0 0 auto}
    .pay input:checked + .pay-txt{color:var(--ink)}
    .pay label:has(input:checked){border-color:var(--gold);background:color-mix(in srgb,var(--gold) 8%,transparent)}
    .pay-txt strong{display:block;font-size:.95rem}
    .pay-txt span{font-size:.82rem;color:var(--ink-mute)}
    .pay-detail{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r);padding:1rem;font-size:.9rem;margin-bottom:1rem}
    .pay-detail code{font-family:ui-monospace,monospace;background:var(--surface-2);padding:.15rem .5rem;border-radius:6px;color:var(--gold-hi)}

    .userbar{display:flex;align-items:center;justify-content:space-between;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r);padding:.7rem 1rem;margin-bottom:1rem;font-size:.9rem}
    .userbar a{color:var(--gold);font-weight:600}

    /* Login centrado y minimalista */
    .auth-wrap{min-height:calc(100svh - 140px);display:grid;place-items:center;padding:2rem 0}
    .auth-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:clamp(1.5rem,5vw,2.4rem)}
    .auth-seal{width:48px;height:48px;margin:0 auto .9rem;display:grid;place-items:center;border-radius:50%;background:var(--bg-2);border:1px solid var(--gold);color:var(--gold);font-family:var(--display);font-weight:800;font-size:1.05rem}
    .auth-title{font-family:var(--display);font-weight:700;font-size:1.25rem;text-align:center;margin-bottom:.35rem;letter-spacing:.01em}
    .auth-sub{text-align:center;color:var(--ink-mute);font-size:.88rem;margin-bottom:1.5rem}

    .empty{text-align:center;padding:4rem 1rem;color:var(--ink-mute)}
    .empty .big{font-size:2.5rem;margin-bottom:.6rem}
    .loading{text-align:center;padding:3rem;color:var(--ink-mute)}
    .spin{width:26px;height:26px;border:2.5px solid var(--border-2);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto .8rem}
    @keyframes sp{to{transform:rotate(360deg)}}

    .ok-screen{text-align:center;padding:2.5rem 1rem}
    .ok-ico{width:70px;height:70px;margin:0 auto 1.2rem;border-radius:50%;display:grid;place-items:center;background:color-mix(in srgb,var(--success) 16%,transparent);color:var(--success)}
    .ok-screen h2{font-family:var(--display);font-size:1.5rem}
    .ok-num{font-family:var(--display);font-size:2rem;color:var(--gold);margin:.6rem 0}

    @media(max-width:840px){
      .co-grid{grid-template-columns:1fr}
      .summary{position:static;order:-1}
      .grid2{grid-template-columns:1fr}
      .stepper .bar{max-width:46px}
    }
  </style>
</head>
<body>
  <header class="co-head">
    <div class="wrap co-head-in">
      <a class="brand" href="index.html"><span class="seal">B</span><span data-brand-name>BAKU</span></a>
      <a class="co-back" href="index.html">← Seguir comprando</a>
    </div>
  </header>

  <main class="wrap" id="app">
    <div class="loading"><div class="spin"></div>Cargando checkout…</div>
  </main>

  <script type="module" src="js/store/checkout.js?v=20260724"></script>
</body>
</html>
