# =============================================================
#  BAKU — configuración de Netlify (sitio estático, sin build)
#  Si tu repositorio de GitHub tiene los archivos del sitio en la
#  raíz (index.html arriba de todo), no toques nada.
#  Si tu repo tiene una carpeta "crudo-studios" adentro, cambia
#  "publish" a "crudo-studios" (o configúralo en el panel de Netlify).
# =============================================================
[build]
  command = ""
  publish = "."

# HTML: siempre fresco (revalida cada visita) → los cambios se ven al toque
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# JS y CSS: revalidan (usamos ?v= para forzar la versión nueva)
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Imágenes y fuentes: se cachean un mes (cambian poco)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
[[headers]]
  for = "/lib/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/producto"
  to = "/producto.html"
  status = 200

[[redirects]]
  from = "/categoria"
  to = "/categoria.html"
  status = 200
